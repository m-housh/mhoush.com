name: Build with Docker and deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: mhoush-netlify-build
      DOCKERFILE: docker/Dockerfile
      PUBLISH_DIR: netlify-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify Git LFS assets
        run: git lfs pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract built site from image
        run: |
          set -euo pipefail
          container_id=$(docker create $IMAGE_NAME:latest)
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"
          docker cp "$container_id":/app/. "$PUBLISH_DIR"
          test -f "$PUBLISH_DIR/index.html"

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=${{ env.PUBLISH_DIR }} --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
